<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&#25235;&#21462;&#20837;&#24235;</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { background: #f3f6fb !important; color: #0f172a !important; }
    header { background: #ffffff !important; border-bottom-color: #e2e8f0 !important; box-shadow: 0 1px 0 rgba(15,23,42,.04); }
    header h1 { display: none !important; }
    header nav a:first-child { color: #1e40af !important; }
    header nav a:last-child { color: #475569 !important; }
    main > div:first-child { background: #ffffff !important; border-color: #dbe3ef !important; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    #status { color: #334155 !important; font-weight: 500; }
    #grid > div { background: #ffffff !important; border-color: #dbe3ef !important; box-shadow: 0 2px 12px rgba(15,23,42,.05); }
    #grid .text-slate-300 { color: #334155 !important; }
    #grid .bg-slate-800 { background: #f1f5f9 !important; }
    #floatImport { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 40; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #059669, #10b981); color: white; font-weight: 600; font-size: 0.875rem; box-shadow: 0 4px 14px rgba(5,150,105,.4); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: transform .2s, box-shadow .2s; }
    #floatImport:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(5,150,105,.5); }
    #floatImport:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #url, #keyword { color: #0f172a !important; background-color: #f8fafc !important; border-color: #cbd5e1 !important; }
    #url::placeholder, #keyword::placeholder { color: #64748b; }
    #btnFetch { background: #2563eb !important; color: #fff !important; }
    #btnFetch:hover { background: #1d4ed8 !important; }
    #btnImport { background: #059669 !important; color: #fff !important; }
    #btnImport:hover { background: #047857 !important; }
    #btnAll, #btnNone { background: #ffffff !important; color: #334155 !important; border: 1px solid #cbd5e1; padding: 0.35rem 0.6rem; border-radius: .5rem; }
    #btnAll:hover, #btnNone:hover { background: #f8fafc !important; color: #0f172a !important; }
    .text-slate-400 { color: #64748b !important; }
    .text-slate-300 { color: #334155 !important; }
    #jsonPaste { color: #0f172a !important; background-color: #f8fafc !important; border-color: #cbd5e1 !important; }
    #jsonPanel summary { color: #334155 !important; }
    #jsonPanel .json-hint { color: #64748b !important; }
    #btnParseJson { background: #7c3aed !important; color: #fff !important; }
    #btnParseJson:hover { background: #6d28d9 !important; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 px-4 py-4 flex flex-wrap gap-4 items-center justify-between">
    <h1 class="text-xl font-semibold text-amber-400">Catalog Porter</h1>
    <nav class="flex gap-3 text-sm">
      <a href="/" class="text-amber-300 font-medium">抓取入庫</a>
      <a href="/inventory" class="text-slate-400 hover:text-white">我的庫存</a>
    </nav>
  </header>
  <main class="max-w-7xl mx-auto p-4">
    <div class="bg-slate-900 rounded-xl p-6 border border-slate-800 mb-6">
      <label for="url" class="block text-sm text-slate-400 mb-1">微商相冊網址 (wecatalog 等)</label>
      <input id="url" type="url" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 mb-4" placeholder="https://..." />
      <label for="keyword" class="block text-sm text-slate-400 mb-1">搜尋關鍵字（可留空）</label>
      <input id="keyword" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 mb-4" placeholder="篩選描述含此字" />
      <label class="flex items-center gap-2 mb-4">
        <input type="checkbox" id="deepScrape" checked />
        <span class="text-sm text-slate-300">深入相冊取得全部圖片（較慢）</span>
      </label>
      <button id="btnFetch" class="bg-amber-600 hover:bg-amber-500 px-6 py-2 rounded-lg font-medium">開始抓取</button>
      <span id="status" class="ml-4 text-slate-400"></span>
    </div>
    <details id="jsonPanel" class="bg-slate-900 rounded-xl p-6 border border-slate-800 mb-6">
      <summary class="cursor-pointer text-sm font-medium select-none">&#36028;&#19978;&#24494;&#21830;&#30456;&#20874; JSON&#65288;result.items&#65289;</summary>
      <p class="text-xs json-hint mt-2 mb-2 leading-relaxed">&#36028;&#19978;&#23436;&#25972; JSON&#65292;&#25110;&#20677;&#21547; <code class="bg-slate-800 px-1 rounded">result.items</code> &#30340;&#29255;&#27573;&#12290;&#35299;&#26512;&#24460;&#33287;&#32178;&#22336;&#25235;&#21462;&#30456;&#21516;&#21015;&#34920;&#65292;&#21487;&#21246;&#36984;&#24460;&#20837;&#24235;&#65288;&#20351;&#29992; imgsSrc &#20840;&#37096;&#22294;&#29255;&#65292;&#20837;&#24235;&#26178;&#19981;&#21478;&#38283;&#27983;&#35261;&#22120;&#28145;&#21270;&#65289;&#12290;</p>
      <textarea id="jsonPaste" class="w-full border rounded-lg px-3 py-2 font-mono text-xs min-h-[140px]" placeholder="{ &quot;result&quot;: { &quot;items&quot;: [...] } }" spellcheck="false"></textarea>
      <button type="button" id="btnParseJson" class="mt-3 px-4 py-2 rounded-lg text-sm font-medium">&#35299;&#26512;&#20006;&#36617;&#20837;&#21015;&#34920;</button>
    </details>
    <div class="bg-slate-900 rounded-xl p-4 border border-slate-800 mb-4">
      <label for="importCategory" class="block text-sm text-slate-500 mb-1">入庫分類（可選，套用到本次入庫；單筆若有 <code class="bg-slate-800 px-1 rounded text-xs">category</code> 則優先）</label>
      <input id="importCategory" type="text" class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="例如：包包、飾品" autocomplete="off" />
    </div>
    <div class="flex gap-3 mb-4 flex-wrap items-center">
      <span class="text-sm text-slate-400">勾選要入庫的項目後點擊按鈕</span>
      <button id="btnImport" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg font-medium disabled:opacity-40" disabled>入庫已選（<span id="selCount">0</span> 項）</button>
      <a id="linkToInventory" href="/inventory" class="hidden bg-amber-600 hover:bg-amber-500 px-4 py-2 rounded-lg font-medium text-white no-underline">前往我的庫存</a>
      <button id="btnAll" type="button" class="text-sm">全選</button>
      <button id="btnNone" type="button" class="text-sm">全不選</button>
    </div>
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
  </main>
  <button type="button" id="floatImport" disabled title="入庫">入庫</button>
  <script>
    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const STORAGE_KEY = 'catalog_porter_fetch';
    let items = [];
    let importSkipEnrich = false;
    function stripQuery(u) { return String(u || '').split('?')[0]; }
    function collectImageUrls(row) {
      if (Array.isArray(row.imgsSrc) && row.imgsSrc.length) return row.imgsSrc.filter(Boolean);
      if (Array.isArray(row.images) && row.images.length) return row.images.map(stripQuery).filter(Boolean);
      if (Array.isArray(row.imgs) && row.imgs.length) return row.imgs.map(stripQuery).filter(Boolean);
      if (row.videoThumbImg) return [stripQuery(row.videoThumbImg)];
      return [];
    }
    function extractJsonObject(text) {
      const t = String(text || '').trim();
      if (!t) throw new Error('請貼上內容');
      try { return JSON.parse(t); } catch (_) {}
      const start = t.indexOf('{');
      const end = t.lastIndexOf('}');
      if (start >= 0 && end > start) {
        try { return JSON.parse(t.slice(start, end + 1)); } catch (e2) {
          throw new Error('JSON 解析失敗');
        }
      }
      throw new Error('找不到 JSON');
    }
    function mapWechatAlbumItems(parsed) {
      const arr = parsed && parsed.result && Array.isArray(parsed.result.items) ? parsed.result.items : null;
      if (!arr) throw new Error('找不到 result.items');
      const out = [];
      for (let r = 0; r < arr.length; r++) {
        const row = arr[r];
        const imageUrls = collectImageUrls(row);
        if (!imageUrls.length) continue;
        const rowCat = row.category != null && String(row.category).trim() !== '' ? String(row.category).trim() : (row.cat != null && String(row.cat).trim() !== '' ? String(row.cat).trim() : undefined);
        const base = { description: row.title || '', imageUrl: imageUrls[0], imageUrls: imageUrls.slice() };
        if (rowCat) base.category = rowCat;
        out.push(base);
      }
      return out;
    }
    function proxy(u) { return '/proxy?url=' + encodeURIComponent(u); }
    function updateFloatBtn() {
      const n = [...document.querySelectorAll('.pick:checked')].length;
      document.getElementById('floatImport').disabled = n === 0;
    }
    function updateSel() {
      const n = [...document.querySelectorAll('.pick:checked')].length;
      document.getElementById('selCount').textContent = n;
      document.getElementById('btnImport').disabled = n === 0;
      updateFloatBtn();
    }
    function saveToStorage() {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          items,
          importSkipEnrich,
          checked: [...document.querySelectorAll('.pick:checked')].map(c => +c.dataset.i),
          url: document.getElementById('url').value,
          keyword: document.getElementById('keyword').value,
          importCategory: document.getElementById('importCategory').value,
          status: statusEl.textContent
        }));
      } catch (_) {}
    }
    function restoreFromStorage() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (!data.items || !data.items.length) return;
        items = data.items;
        importSkipEnrich = !!data.importSkipEnrich;
        if (data.url) document.getElementById('url').value = data.url;
        if (data.keyword) document.getElementById('keyword').value = data.keyword || '';
        if (data.importCategory != null) document.getElementById('importCategory').value = data.importCategory;
        statusEl.textContent = data.status || '';
        renderGrid();
        if (Array.isArray(data.checked) && data.checked.length) {
          data.checked.forEach(i => {
            const cb = grid.querySelector('.pick[data-i="' + i + '"]');
            if (cb) cb.checked = true;
          });
          updateSel();
        }
      } catch (_) {}
    }
    function renderGrid() {
      grid.innerHTML = '';
      items.forEach((it, i) => {
        const card = document.createElement('div');
        card.className = 'bg-slate-900 border border-slate-800 rounded-lg overflow-hidden';
        card.innerHTML = '<label class="block cursor-pointer"><div class="aspect-square bg-slate-800 relative"><img class="w-full h-full object-cover" loading="lazy" src="' + proxy(it.imageUrl) + '" /></div><div class="p-2"><input type="checkbox" class="pick mr-2 align-middle" data-i="' + i + '" /><span class="text-xs text-slate-300 line-clamp-4">' + (it.description || '').slice(0,80).replace(/</g,'&lt;') + ((it.description||'').length > 80 ? '...' : '') + '</span></div></label>';
        grid.appendChild(card);
      });
      grid.querySelectorAll('.pick').forEach(cb => cb.onchange = () => { updateSel(); saveToStorage(); });
      updateSel();
      updateFloatBtn();
    }
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveToStorage(); });
    window.addEventListener('beforeunload', saveToStorage);
    restoreFromStorage();
    document.getElementById('btnFetch').onclick = async () => {
      const url = document.getElementById('url').value.trim();
      const keyword = document.getElementById('keyword').value.trim();
      if (!url) { alert('請輸入網址'); return; }
      statusEl.textContent = document.getElementById('deepScrape').checked ? '抓取中（深入相冊較慢，約 2–5 分鐘）...' : '抓取中（可能需 1–2 分鐘）...';
      grid.innerHTML = '';
      try {
        const ctrl = new AbortController();
        const deepScrape = document.getElementById('deepScrape').checked;
        const timeoutMs = keyword ? 2*60*1000 : (deepScrape ? 12*60*1000 : 8*60*1000);
        const t = setTimeout(() => ctrl.abort(), timeoutMs);
        let r; try { r = await fetch('/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url, keyword, deepScrape }), signal: ctrl.signal }); } finally { clearTimeout(t); }
        
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || '失敗');
        items = j.items || [];
        importSkipEnrich = false;
        const ts = typeof j.totalScraped === 'number' ? j.totalScraped : items.length;
        statusEl.textContent = (j.keyword ? '先抓到 ' + ts + ' 筆，關鍵字後 ' + items.length + ' 筆' : '共 ' + items.length + ' 筆') + '（已排除缺貨/售罄）';
        if (j.hint) statusEl.textContent += ' — ' + j.hint;
        renderGrid();
        saveToStorage();
      } catch (e) {
        statusEl.textContent = '';
        alert(e.name === 'AbortError' ? '抓取逾時（超過 8 分鐘）。可取消勾選「深入相冊」再試。' : (e.message || '抓取失敗'));
      }
    };
    document.getElementById('btnAll').onclick = () => { grid.querySelectorAll('.pick').forEach(c => { c.checked = true; }); updateSel(); saveToStorage(); };
    document.getElementById('btnNone').onclick = () => { grid.querySelectorAll('.pick').forEach(c => { c.checked = false; }); updateSel(); saveToStorage(); };
    document.getElementById('btnParseJson').onclick = () => {
      const raw = document.getElementById('jsonPaste').value;
      try {
        const parsed = extractJsonObject(raw);
        const mapped = mapWechatAlbumItems(parsed);
        if (!mapped.length) { alert('沒有可用項目（需有圖片網址）'); return; }
        items = mapped;
        importSkipEnrich = true;
        statusEl.textContent = 'JSON 已載入 ' + items.length + ' 筆（入庫沿用 API 圖片，不另開深化）';
        renderGrid();
        saveToStorage();
      } catch (e) {
        alert(e.message || '解析失敗');
      }
    };
    async function doImport(sel) {
      statusEl.textContent = '入庫中...';
      try {
        const defaultCategory = document.getElementById('importCategory').value.trim();
        const r = await fetch('/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items: sel, skipEnrich: importSkipEnrich, defaultCategory }) });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || '入庫失敗');
        if (j.ok === false) throw new Error(j.error || '入庫失敗');
        const n = (j.saved || []).length;
        if (n === 0) {
          alert('入庫 0 筆，請確認已勾選商品');
          statusEl.textContent = '';
          saveToStorage();
        } else {
          statusEl.textContent = '已入庫 ' + n + ' 筆';
          alert('已入庫完成');
          document.getElementById('linkToInventory').classList.remove('hidden');
          saveToStorage();
        }
      } catch (e) { alert(e.message); statusEl.textContent = ''; }
    }
    document.getElementById('btnImport').onclick = async () => {
      const sel = [...document.querySelectorAll('.pick:checked')].map(c => items[+c.dataset.i]);
      if (!sel.length) return;
      doImport(sel);
    };
    document.getElementById('floatImport').onclick = async () => {
      const sel = [...document.querySelectorAll('.pick:checked')].map(c => items[+c.dataset.i]);
      if (!sel.length) return;
      if (!confirm('確定要入庫已選的 ' + sel.length + ' 項？')) return;
      await doImport(sel);
    };
  </script>
</body>
</html>
