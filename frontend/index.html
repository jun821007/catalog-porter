<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalog Porter — 抓取入庫</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 px-4 py-4 flex flex-wrap gap-4 items-center justify-between">
    <h1 class="text-xl font-semibold text-amber-400">Catalog Porter</h1>
    <nav class="flex gap-3 text-sm">
      <a href="/" class="text-amber-300 font-medium">抓取入庫</a>
      <a href="/inventory" class="text-slate-400 hover:text-white">我的庫存</a>
    </nav>
  </header>
  <main class="max-w-7xl mx-auto p-4">
    <div class="bg-slate-900 rounded-xl p-6 border border-slate-800 mb-6">
      <label class="block text-sm text-slate-400 mb-1">微商相冊網址 (wecatalog 等)</label>
      <input id="url" type="url" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 mb-4" placeholder="https://..." />
      <label class="block text-sm text-slate-400 mb-1">搜尋關鍵字（可留空）</label>
      <input id="keyword" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 mb-4" placeholder="篩選描述含此字" />
      <button id="btnFetch" class="bg-amber-600 hover:bg-amber-500 px-6 py-2 rounded-lg font-medium">開始抓取</button>
      <span id="status" class="ml-4 text-slate-400"></span>
    </div>
    <div class="flex gap-3 mb-4">
      <button id="btnImport" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg font-medium disabled:opacity-40" disabled>批量入庫（已選 <span id="selCount">0</span>）</button>
      <button id="btnAll" type="button" class="text-slate-400 text-sm underline">全選</button>
      <button id="btnNone" type="button" class="text-slate-400 text-sm underline">全不選</button>
    </div>
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
  </main>
  <script>
    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    let items = [];
    function proxy(u) { return '/proxy?url=' + encodeURIComponent(u); }
    function updateSel() {
      const n = [...document.querySelectorAll('.pick:checked')].length;
      document.getElementById('selCount').textContent = n;
      document.getElementById('btnImport').disabled = n === 0;
    }
    document.getElementById('btnFetch').onclick = async () => {
      const url = document.getElementById('url').value.trim();
      const keyword = document.getElementById('keyword').value.trim();
      if (!url) { alert('請輸入網址'); return; }
      statusEl.textContent = '抓取中（可能需 1–2 分鐘）...';
      grid.innerHTML = '';
      try {
        const r = await fetch('/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url, keyword }) });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || '失敗');
        items = j.items || [];
        statusEl.textContent = '共 ' + items.length + ' 筆（已排除缺貨/售罄與關鍵字篩選）';
        items.forEach((it, i) => {
          const card = document.createElement('div');
          card.className = 'bg-slate-900 border border-slate-800 rounded-lg overflow-hidden';
          card.innerHTML = '<label class="block cursor-pointer"><div class="aspect-square bg-slate-800 relative"><img class="w-full h-full object-cover" loading="lazy" src="' + proxy(it.imageUrl) + '" /></div><div class="p-2"><input type="checkbox" class="pick mr-2 align-middle" data-i="' + i + '" /><span class="text-xs text-slate-300 line-clamp-4">' + (it.description || '').replace(/</g,'&lt;') + '</span></div></label>';
          grid.appendChild(card);
        });
        grid.querySelectorAll('.pick').forEach(cb => cb.onchange = updateSel);
      } catch (e) {
        statusEl.textContent = '';
        alert(e.message);
      }
    };
    document.getElementById('btnAll').onclick = () => { grid.querySelectorAll('.pick').forEach(c => { c.checked = true; }); updateSel(); };
    document.getElementById('btnNone').onclick = () => { grid.querySelectorAll('.pick').forEach(c => { c.checked = false; }); updateSel(); };
    document.getElementById('btnImport').onclick = async () => {
      const sel = [...document.querySelectorAll('.pick:checked')].map(c => items[+c.dataset.i]);
      if (!sel.length) return;
      statusEl.textContent = '入庫中...';
      try {
        const r = await fetch('/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items: sel }) });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error);
        alert('已入庫 ' + j.saved.length + ' 筆');
        statusEl.textContent = '';
      } catch (e) { alert(e.message); statusEl.textContent = ''; }
    };
  </script>
</body>
</html>
