<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>抓取入庫</title>
  <link rel="stylesheet" href="/styles.css?v=5" />
  <style>
    body { background: #f3f6fb !important; color: #0f172a !important; }
    header { background: #ffffff !important; border-bottom-color: #e2e8f0 !important; box-shadow: 0 1px 0 rgba(15,23,42,.04); }
    header h1 { display: none !important; }
    header nav a:nth-child(1) { color: #1e40af !important; }
    header nav a:nth-child(2) { color: #475569 !important; }
    header nav a:nth-child(3) { color: #475569 !important; }
    .surface-card {
      background: #ffffff !important;
      border-color: #dbe3ef !important;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
      color: #0f172a !important;
    }
    .surface-card label { color: #475569 !important; }
    .surface-card .field {
      color: #0f172a !important;
      background-color: #f8fafc !important;
      border-color: #cbd5e1 !important;
    }
    /* 蓋過 styles.css 全域 input 深色與 Chrome autofill 強制黑底 */
    .surface-card input.field,
    .surface-card select.field {
      color: #0f172a !important;
      background-color: #f8fafc !important;
      border: 1px solid #cbd5e1 !important;
    }
    .surface-card input.field:-webkit-autofill,
    .surface-card input.field:-webkit-autofill:hover,
    .surface-card input.field:-webkit-autofill:focus,
    .surface-card select.field:-webkit-autofill,
    .surface-card select.field:-webkit-autofill:hover,
    .surface-card select.field:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #f8fafc inset !important;
      -webkit-text-fill-color: #0f172a !important;
      caret-color: #0f172a !important;
    }
    #status { color: #334155 !important; font-weight: 500; }
    #grid > div { background: #ffffff !important; border-color: #e2e8f0 !important; box-shadow: 0 2px 12px rgba(15,23,42,.05); }
    #grid .grid-desc { color: #334155 !important; }
    #grid .thumb-bg { background: #f1f5f9 !important; }
    #floatImport { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 40; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #059669, #10b981); color: white; font-weight: 600; font-size: 0.875rem; box-shadow: 0 4px 14px rgba(5,150,105,.4); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: transform .2s, box-shadow .2s; }
    #floatImport:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(5,150,105,.5); }
    #floatImport:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #url, #keyword { color: #0f172a !important; background-color: #f8fafc !important; border-color: #cbd5e1 !important; }
    #url::placeholder, #keyword::placeholder { color: #64748b; }
    #btnFetch { background: #2563eb !important; color: #fff !important; }
    #btnFetch:hover { background: #1d4ed8 !important; }
    #btnImport { background: #059669 !important; color: #fff !important; }
    #btnImport:hover { background: #047857 !important; }
    #btnAll, #btnNone { background: #ffffff !important; color: #334155 !important; border: 1px solid #cbd5e1; padding: 0.35rem 0.6rem; border-radius: .5rem; }
    #btnAll:hover, #btnNone:hover { background: #f8fafc !important; color: #0f172a !important; }
    .text-slate-400 { color: #64748b !important; }
    .text-slate-300 { color: #334155 !important; }
    #importCatModal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    #importCatModal.open { display: flex !important; }
    #importCatBackdrop { background: rgba(51, 65, 85, 0.35) !important; }
    #importCatModal .panel { position: relative; z-index: 1; width: 100%; max-width: 22rem; }
  </style>
</head>
<body class="min-h-screen">
  <header class="border-b border-slate-200 px-4 py-4 flex flex-wrap gap-4 items-center justify-between">
    <h1 class="text-xl font-semibold text-amber-400">Catalog Porter</h1>
    <nav class="flex gap-3 text-sm">
      <a href="/" class="text-amber-300 font-medium">抓取入庫</a>
      <a href="/inventory?v=batch5" class="text-slate-400 hover:text-white">我的庫存</a>
      <a href="/merchants" class="text-slate-400 hover:text-white">管理商家</a>
    </nav>
  </header>
  <main class="max-w-7xl mx-auto p-4">
    <div class="surface-card rounded-xl p-6 border mb-6">
      <span class="block text-sm mb-2 font-medium text-slate-700">商家捷徑（存於伺服器；選商家會載入「管理商家」儲存的商品快照；入庫分類於入庫時選）</span>
      <div class="flex flex-wrap gap-2 items-end">
        <div class="flex-1 min-w-[200px] max-w-md">
          <label for="merchantSelect" class="block text-xs text-slate-600 mb-1">選商家</label>
          <select id="merchantSelect" class="field w-full border rounded-lg px-3 py-2 text-sm">
            <option value="">未選擇</option>
          </select>
        </div>
      </div>
      <p class="text-xs text-slate-500 mt-2">有商品快照時可不填網址，按「開始抓取」依關鍵字篩選快照。無快照時會自動帶入「管理商家」所存相冊網址（略過圖片直連；多個時取第一個可抓取連結），再按「開始抓取」即可。新增／編輯請至「管理商家」。</p>
    </div>
    <div class="surface-card rounded-xl p-6 border mb-6">
      <h2 class="text-sm font-medium text-slate-800 mb-3">微商相冊網址抓取</h2>
      <label for="url" class="block text-sm mb-1">微商相冊網址 (wecatalog 等)</label>
      <input id="url" type="url" class="field w-full border rounded-lg px-3 py-2 mb-4" placeholder="https://...（線上抓取時必填；有快照時可留空）" />
      <label for="keyword" class="block text-sm mb-1">搜尋關鍵字（可留空）</label>
      <input id="keyword" type="text" class="field w-full border rounded-lg px-3 py-2 mb-4" placeholder="篩選描述含此字" />
      <label class="flex items-center gap-2 mb-4">
        <input type="checkbox" id="deepScrape" checked />
        <span class="text-sm text-slate-600">深入相冊取得全部圖片（較慢）</span>
      </label>
      <button id="btnFetch" class="bg-amber-600 hover:bg-amber-500 px-6 py-2 rounded-lg font-medium text-white">開始抓取</button>
      <span id="status" class="ml-4 text-slate-500"></span>
    </div>
    <div class="flex gap-3 mb-4 flex-wrap items-center">
      <span class="text-sm text-slate-500">勾選要入庫的項目後點擊按鈕</span>
      <button id="btnImport" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg font-medium disabled:opacity-40 text-white" disabled>入庫已選（<span id="selCount">0</span> 項）</button>
      <a id="linkToInventory" href="/inventory?v=batch5" class="hidden bg-amber-600 hover:bg-amber-500 px-4 py-2 rounded-lg font-medium text-white no-underline">前往我的庫存</a>
      <button id="btnAll" type="button" class="text-sm">全選</button>
      <button id="btnNone" type="button" class="text-sm">全不選</button>
    </div>
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
  </main>
  <div id="importCatModal" role="dialog" aria-modal="true" aria-labelledby="importCatTitle">
    <div id="importCatBackdrop" class="absolute inset-0"></div>
    <div class="panel surface-card rounded-xl border p-5 shadow-xl">
      <h2 id="importCatTitle" class="text-base font-semibold text-slate-800">選擇入庫分類</h2>
      <p class="text-xs text-slate-500 mt-1 mb-4">即將入庫 <span id="importCatCount">0</span> 項</p>
      <label for="importCatSelect" class="block text-sm text-slate-600 mb-1">分類</label>
      <select id="importCatSelect" class="field w-full border rounded-lg px-3 py-2 mb-3 text-sm"></select>
      <p class="text-xs text-slate-400 mb-4 leading-relaxed">預設可選「未分類」。JSON 單筆若已有 category 欄位，仍以該筆為準。</p>
      <div class="flex gap-2 justify-end">
        <button type="button" id="importCatCancel" class="px-4 py-2 rounded-lg border border-slate-300 text-sm text-slate-700 bg-white hover:bg-slate-50">取消</button>
        <button type="button" id="importCatConfirm" class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium">確認入庫</button>
      </div>
    </div>
  </div>


  <button type="button" id="floatImport" disabled title="入庫">入庫</button>
  <script>
    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const STORAGE_KEY = 'catalog_porter_fetch';
    const LAST_CAT_KEY = 'catalog_porter_last_import_category';
    let items = [];
    let importSkipEnrich = false;
    let pendingImportSel = null;

    let merchantsCache = [];
    let cachedMerchantSnapshot = null;
    let selectedMerchantLabel = '';

    function filterItemsByKeyword(arr, kw) {
      const k = String(kw || '').trim().toLowerCase();
      if (!k) return arr.slice();
      return arr.filter((it) => String(it.description || '').toLowerCase().indexOf(k) >= 0);
    }
    function isUnusableScrapeUrl(u) {
      const s = String(u || '').trim().toLowerCase();
      if (!s) return false;
      if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|#|$)/i.test(s)) return true;
      if (/xcimg\.szwego\.com\/img\//i.test(s)) return true;
      if (/\/img\/[a-f0-9]{6,}\//i.test(s) && /\.(jpg|jpeg|png)/i.test(s)) return true;
      return false;
    }
    function firstScrapeableAlbumUrl(sources) {
      const urls = (sources || []).map((s) => s && s.url).filter(Boolean);
      for (let i = 0; i < urls.length; i++) {
        if (!isUnusableScrapeUrl(urls[i])) return urls[i];
      }
      return '';
    }
    async function loadMerchantsForList() {
      try {
        const r = await fetch("/api/merchants?_=" + Date.now(), { cache: "no-store" });
        const j = await r.json();
        merchantsCache = (j.ok && Array.isArray(j.merchants)) ? j.merchants : [];
      } catch (_) { merchantsCache = []; }
    }

    async function refreshMerchantSelect(preferredId) {
      await loadMerchantsForList();
      const sel = document.getElementById('merchantSelect');
      let cur = preferredId != null ? preferredId : sel.value;
      sel.innerHTML = '';
      const o0 = document.createElement('option');
      o0.value = '';
      o0.textContent = '未選擇';
      sel.appendChild(o0);
      try {
        const r = await fetch('/api/merchants?_=' + Date.now(), { cache: 'no-store' });
        const j = await r.json();
        merchantsCache = (j.ok && Array.isArray(j.merchants)) ? j.merchants : [];
        for (const m of merchantsCache) {
          const o = document.createElement('option');
          o.value = m.id;
          o.textContent = m.name;
          sel.appendChild(o);
        }
      } catch (_) { merchantsCache = []; }
      if (cur && [...sel.options].some((o) => o.value === cur)) sel.value = cur;
      else sel.value = '';
      const v = document.getElementById('merchantSelect').value;
      if (v) void loadMerchantCatalog(v);
    }
    async function loadMerchantCatalog(mid) {
      if (!mid) return;
      const urlEl = document.getElementById('url');
      urlEl.value = '';
      try {
        const r = await fetch('/api/merchants/' + encodeURIComponent(mid) + '?_=' + Date.now(), { cache: 'no-store' });
        const j = await r.json();
        if (!r.ok || !j.ok || !j.merchant) throw new Error(j.message || j.error || '載入失敗');
        const m = j.merchant;
        const snap = m.catalogItems;
        const sourceList = m.sources || [];
        const sourceUrls = sourceList.map((s) => s && s.url).filter(Boolean);
        selectedMerchantLabel = (m.name || '').replace(/</g, '');
        if (Array.isArray(snap) && snap.length) {
          cachedMerchantSnapshot = snap.slice();
          items = snap.slice();
          importSkipEnrich = true;
          statusEl.textContent = '已載入「' + selectedMerchantLabel + '」快照 ' + snap.length + ' 筆（可不填網址按「開始抓取」依關鍵字篩選；或直接勾選入庫）';
          renderGrid();
          saveToStorage();
        } else {
          cachedMerchantSnapshot = null;
          items = [];
          renderGrid();
          const autoUrl = firstScrapeableAlbumUrl(sourceList);
          if (autoUrl) {
            urlEl.value = autoUrl;
            const n = sourceUrls.length;
            statusEl.textContent = '「' + selectedMerchantLabel + '」已從捷徑帶入相冊網址（' + (n > 1 ? '共 ' + n + ' 個，已選第一個可抓取連結' : '管理商家所存') + '）。可按「開始抓取」線上抓取。';
          } else if (sourceUrls.length) {
            statusEl.textContent = '「' + selectedMerchantLabel + '」在管理商家存的網址可能是圖片直連，無法自動帶入；請手動貼相冊頁網址。';
          } else {
            statusEl.textContent = '「' + selectedMerchantLabel + '」尚無商品快照與相冊網址；請至「管理商家」新增。';
          }
          saveToStorage();
        }
      } catch (e) {
        alert(e.message || '載入商家失敗');
      }
    }
    function proxy(u) { return '/proxy?url=' + encodeURIComponent(u); }
    function updateFloatBtn() {
      const n = [...document.querySelectorAll('.pick:checked')].length;
      document.getElementById('floatImport').disabled = n === 0;
    }
    function updateSel() {
      const n = [...document.querySelectorAll('.pick:checked')].length;
      document.getElementById('selCount').textContent = n;
      document.getElementById('btnImport').disabled = n === 0;
      updateFloatBtn();
    }
    function saveToStorage() {
      try {
        const urlEl = document.getElementById('url');
        let urlVal = urlEl.value;
        if (isUnusableScrapeUrl(urlVal)) {
          urlVal = '';
          urlEl.value = '';
        }
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          items,
          importSkipEnrich,
          checked: [...document.querySelectorAll('.pick:checked')].map(c => +c.dataset.i),
          url: urlVal,
          keyword: document.getElementById('keyword').value,
          status: statusEl.textContent
        }));
      } catch (_) {}
    }
    function restoreFromStorage() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (!data.items || !data.items.length) return;
        items = data.items;
        importSkipEnrich = !!data.importSkipEnrich;
        const urlEl = document.getElementById('url');
        if (importSkipEnrich || !data.url || isUnusableScrapeUrl(data.url)) urlEl.value = '';
        else urlEl.value = data.url;
        if (data.keyword) document.getElementById('keyword').value = data.keyword || '';
        statusEl.textContent = data.status || '';
        renderGrid();
        if (Array.isArray(data.checked) && data.checked.length) {
          data.checked.forEach(i => {
            const cb = grid.querySelector('.pick[data-i="' + i + '"]');
            if (cb) cb.checked = true;
          });
          updateSel();
        }
      } catch (_) {}
    }

    async function refreshImportCategorySelect() {
      const sel = document.getElementById('importCatSelect');
      sel.innerHTML = '';
      const o0 = document.createElement('option');
      o0.value = '';
      o0.textContent = '未分類';
      sel.appendChild(o0);
      try {
        const r = await fetch('/api/categories?_=' + Date.now(), { cache: 'no-store' });
        const j = await r.json();
        if (j.ok && Array.isArray(j.categories)) {
          j.categories.forEach((c) => {
            if (!c || c === '未分類') return;
            if ([...sel.options].some((opt) => opt.value === c)) return;
            const o = document.createElement('option');
            o.value = c;
            o.textContent = c;
            sel.appendChild(o);
          });
        }
      } catch (_) {}
      const last = localStorage.getItem(LAST_CAT_KEY);
      if (last !== null && [...sel.options].some((opt) => opt.value === last)) sel.value = last;
      else sel.value = '';
    }
    function openImportModal(sel) {
      pendingImportSel = sel;
      document.getElementById('importCatCount').textContent = String(sel.length);
      refreshImportCategorySelect().then(() => {
        document.getElementById('importCatModal').classList.add('open');
      });
    }
    function closeImportModal() {
      document.getElementById('importCatModal').classList.remove('open');
      pendingImportSel = null;
    }
    function resolveImportCategory() {
      return document.getElementById('importCatSelect').value;
    }

    function renderGrid() {
      grid.innerHTML = '';
      items.forEach((it, i) => {
        const card = document.createElement('div');
        card.className = 'border rounded-lg overflow-hidden';
        card.innerHTML = '<label class="block cursor-pointer"><div class="aspect-square thumb-bg relative"><img class="w-full h-full object-cover" loading="lazy" src="' + proxy(it.imageUrl) + '" /></div><div class="p-2 bg-white"><input type="checkbox" class="pick mr-2 align-middle" data-i="' + i + '" /><span class="text-xs grid-desc line-clamp-4">' + (it.description || '').slice(0,80).replace(/</g,'&lt;') + ((it.description||'').length > 80 ? '...' : '') + '</span></div></label>';
        grid.appendChild(card);
      });
      grid.querySelectorAll('.pick').forEach(cb => cb.onchange = () => { updateSel(); saveToStorage(); });
      updateSel();
      updateFloatBtn();
    }
    document.getElementById('importCatBackdrop').onclick = closeImportModal;
    document.getElementById('importCatCancel').onclick = closeImportModal;
    document.getElementById('importCatConfirm').onclick = async () => {
      if (!pendingImportSel || !pendingImportSel.length) { closeImportModal(); return; }
      const defaultCategory = resolveImportCategory();
      localStorage.setItem(LAST_CAT_KEY, defaultCategory);
      const sel = pendingImportSel;
      closeImportModal();
      await doImport(sel, defaultCategory);
    };
    document.addEventListener('keydown', (e) => {
      const m = document.getElementById('importCatModal');
      if (m.classList.contains('open') && e.key === 'Escape') { closeImportModal(); e.preventDefault(); }
    });
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveToStorage(); });
    window.addEventListener('beforeunload', saveToStorage);
    restoreFromStorage();
    document.getElementById('btnFetch').onclick = async () => {
      const url = document.getElementById('url').value.trim();
      const keyword = document.getElementById('keyword').value.trim();
      const mid = document.getElementById('merchantSelect').value;
      if (!url) {
        if (mid && cachedMerchantSnapshot && cachedMerchantSnapshot.length) {
          items = filterItemsByKeyword(cachedMerchantSnapshot, keyword);
          importSkipEnrich = true;
          const kwPart = keyword ? '關鍵字「' + keyword + '」篩選後 ' : '';
          statusEl.textContent = kwPart + items.length + ' 筆（「' + selectedMerchantLabel + '」快照，可勾選後入庫）';
          renderGrid();
          saveToStorage();
          return;
        }
        alert('請貼上相冊頁網址以線上抓取，或先選擇已有商品快照的商家');
        return;
      }
      statusEl.textContent = document.getElementById('deepScrape').checked ? '抓取中（深入相冊較慢，約 2–5 分鐘）...' : '抓取中（可能需 1–2 分鐘）...';
      grid.innerHTML = '';
      try {
        const ctrl = new AbortController();
        const deepScrape = document.getElementById('deepScrape').checked;
        const timeoutMs = keyword ? 2*60*1000 : (deepScrape ? 12*60*1000 : 8*60*1000);
        const t = setTimeout(() => ctrl.abort(), timeoutMs);
        let r; try { r = await fetch('/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url, keyword, deepScrape }), signal: ctrl.signal }); } finally { clearTimeout(t); }
        
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || '失敗');
        items = j.items || [];
        importSkipEnrich = false;
        const ts = typeof j.totalScraped === 'number' ? j.totalScraped : items.length;
        statusEl.textContent = (j.keyword ? '先抓到 ' + ts + ' 筆，關鍵字後 ' + items.length + ' 筆' : '共 ' + items.length + ' 筆') + '（已排除缺貨/售罄）';
        if (j.hint) statusEl.textContent += ' — ' + j.hint;
        renderGrid();
        saveToStorage();
      } catch (e) {
        statusEl.textContent = '';
        alert(e.name === 'AbortError' ? '抓取逾時（超過 8 分鐘）。可取消勾選「深入相冊」再試。' : (e.message || '抓取失敗'));
      }
    };
    document.getElementById('btnAll').onclick = () => { grid.querySelectorAll('.pick').forEach(c => { c.checked = true; }); updateSel(); saveToStorage(); };
    document.getElementById('btnNone').onclick = () => { grid.querySelectorAll('.pick').forEach(c => { c.checked = false; }); updateSel(); saveToStorage(); };
    async function doImport(sel, defaultCategory) {
      statusEl.textContent = '入庫中...';
      try {
        const r = await fetch('/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items: sel, skipEnrich: importSkipEnrich, defaultCategory: defaultCategory || '' }) });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || '入庫失敗');
        if (j.ok === false) throw new Error(j.error || '入庫失敗');
        const n = (j.saved || []).length;
        if (n === 0) {
          alert('入庫 0 筆，請確認已勾選商品');
          statusEl.textContent = '';
          saveToStorage();
        } else {
          statusEl.textContent = '已入庫 ' + n + ' 筆';
          alert('已入庫完成');
          document.getElementById('linkToInventory').classList.remove('hidden');
          saveToStorage();
        }
      } catch (e) { alert(e.message); statusEl.textContent = ''; }
    }
    document.getElementById('btnImport').onclick = () => {
      const sel = [...document.querySelectorAll('.pick:checked')].map(c => items[+c.dataset.i]);
      if (!sel.length) return;
      openImportModal(sel);
    };
    document.getElementById('floatImport').onclick = () => {
      const sel = [...document.querySelectorAll('.pick:checked')].map(c => items[+c.dataset.i]);
      if (!sel.length) return;
      openImportModal(sel);
    };
    document.getElementById('merchantSelect').onchange = () => {
      const v = document.getElementById('merchantSelect').value;
      const urlEl = document.getElementById('url');
      if (!v) {
        urlEl.value = '';
        cachedMerchantSnapshot = null;
        selectedMerchantLabel = '';
        items = [];
        renderGrid();
        statusEl.textContent = '';
        saveToStorage();
        return;
      }
      void loadMerchantCatalog(v);
    };

    refreshMerchantSelect();
  </script>
</body>
</html>
