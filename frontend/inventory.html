<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&#25105;&#30340;&#24235;&#23384;</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { background: #f3f6fb !important; color: #0f172a !important; }
    header { background: #ffffff; border-bottom-color: #e2e8f0 !important; box-shadow: 0 1px 0 rgba(15,23,42,.04); }
    header h1 { display: none !important; }
    header nav a:first-child { color: #475569 !important; }
    header nav a:last-child { color: #1e40af !important; }
    #q { color: #0f172a !important; background-color: #f8fafc !important; border-color: #cbd5e1 !important; }
    #q::placeholder { color: #64748b; }
    #btnSearch { background: #2563eb !important; color: #fff !important; }
    #btnShare, #btnBatchDel { color: #fff !important; }
    #btnSelectAll, #btnSelectNone { background: #ffffff !important; color: #334155 !important; border: 1px solid #cbd5e1; padding: 0.35rem 0.6rem; border-radius: .5rem; text-decoration: none !important; }
    #btnSelectAll:hover, #btnSelectNone:hover { background: #f8fafc !important; color: #0f172a !important; }
    .bg-slate-900 { background: #ffffff !important; }
    .bg-slate-800 { background: #f1f5f9 !important; }
    .border-slate-800, .border-slate-700 { border-color: #dbe3ef !important; }
    .text-slate-300 { color: #334155 !important; }
    .text-slate-400, #countBadge { color: #64748b !important; }
    .text-slate-500 { color: #64748b !important; }
    .text-amber-400 { color: #1e40af !important; }
    #lightboxCloseTop { position: absolute; top: 0.75rem; right: 0.75rem; width: 2.2rem; height: 2.2rem; border: 0; border-radius: 9999px; background: rgba(15, 23, 42, 0.72); color: #fff; font-size: 1.5rem; line-height: 1; cursor: pointer; }
    #lightbox { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.85); align-items: center; justify-content: center; padding: 1rem; }
    #lightbox.show { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; }
    #lightbox .desc { max-width: 90vw; margin-top: 0.5rem; text-align: left; font-size: 0.875rem; color: #cbd5e1; }
    #lightbox .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 0.5rem 1rem; background: rgba(255,255,255,.2); border-radius: 8px; cursor: pointer; color: #fff; user-select: none; z-index: 10; }
    #lightbox .nav-btn:hover { background: rgba(255,255,255,.35); }
    #lightbox .nav-prev { left: 1rem; }
    #lightbox .nav-next { right: 1rem; }
    #lightbox .nav-dots { display: flex; gap: 0.25rem; margin-top: 0.5rem; justify-content: center; }
    #lightbox .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.4); cursor: pointer; }
    #lightbox .nav-dot.active { background: #fff; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .pickLarge { width: 1.45rem; height: 1.45rem; accent-color: #2563eb; }
    #descEditModal { display: none; position: fixed; inset: 0; z-index: 60; align-items: center; justify-content: center; padding: 1rem; }
    #descEditModal.show { display: flex; }
    #descEditBackdrop { position: absolute; inset: 0; background: rgba(0,0,0,.6); }
    #descEditPanel { position: relative; z-index: 1; width: 100%; max-width: 32rem; max-height: 90vh; display: flex; flex-direction: column; }
    .descPreview:focus { outline: 2px solid #3b82f6; outline-offset: 2px; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 px-4 py-4 flex flex-wrap gap-4 items-center justify-between">
    <h1 class="text-xl font-semibold text-amber-400">我的庫存<span id="countBadge" class="text-slate-400 font-normal ml-2 text-base"></span></h1>
    <nav class="flex gap-3 text-sm">
      <a href="/" class="text-slate-400 hover:text-white">抓取入庫</a>
      <a href="/inventory" class="text-amber-300 font-medium">我的庫存</a>
    </nav>
  </header>
  <main class="max-w-7xl mx-auto p-4">
    <div class="flex flex-wrap gap-3 mb-6">
      <label for="q" class="sr-only">搜尋描述</label>
      <input id="q" type="search" class="flex-1 min-w-[200px] bg-slate-800 border border-slate-700 rounded-lg px-3 py-2" placeholder="搜尋描述..." aria-label="搜尋描述" />
      <button id="btnSearch" class="bg-slate-700 px-4 py-2 rounded-lg">搜尋</button>
      <label for="catFilter" class="sr-only">分類</label>
      <select id="catFilter" class="min-w-[160px] bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200">
        <option value="">全部分類</option>
        <option value="__none__">未分類</option>
      </select>
    </div>
    <div class="flex gap-3 mb-4 flex-wrap items-center">
      <button id="btnShare" class="bg-violet-600 hover:bg-violet-500 px-4 py-2 rounded-lg font-medium disabled:opacity-40" disabled>生成分享連結</button>
      <button id="btnBatchDel" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-lg font-medium disabled:opacity-40" disabled>批量刪除</button>
      <button id="btnSelectAll" class="text-slate-400 hover:text-white text-sm underline">全選</button>
      <button id="btnSelectNone" class="text-slate-400 hover:text-white text-sm underline">取消全選</button>
      <span id="shareOut" class="text-sm text-emerald-400 break-all"></span>
      <button id="btnCopyShare" class="hidden bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-sm">&#35079;&#35069;</button>
    </div>
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
    <details class="mt-6 text-xs text-slate-500" id="debugPanel">
      <summary>診斷資訊</summary>
      <pre id="debugOut" class="mt-2 p-3 bg-slate-900 rounded overflow-auto max-h-32"></pre>
    </details>
  </main>
  <div id="lightbox" role="dialog" aria-modal="true">
    <button type="button" class="nav-btn nav-prev" id="lightboxPrev" style="display:none">‹ 上一張</button>
    <button type="button" class="nav-btn nav-next" id="lightboxNext" style="display:none">下一張 ›</button>
    <div class="flex flex-col items-center relative">
      <button type="button" id="lightboxCloseTop" aria-label="Close">&times;</button>
      <img id="lightboxImg" alt="預覽" />
      <div id="lightboxNav" class="nav-dots"></div>
      <div id="lightboxDesc" class="desc"></div>
    </div>
  </div>
  <div id="descEditModal" aria-modal="true" role="dialog" aria-labelledby="descEditTitle">
    <div id="descEditBackdrop"></div>
    <div id="descEditPanel" class="bg-slate-900 border border-slate-600 rounded-lg shadow-xl p-4">
      <div id="descEditTitle" class="text-sm text-slate-300 mb-2">編輯描述與分類</div>
      <label for="descEditCat" class="block text-xs text-slate-500 mb-1">分類</label>
      <input type="text" id="descEditCat" class="w-full mb-2 bg-slate-800 border border-slate-600 rounded px-2 py-1.5 text-slate-200 text-sm" placeholder="留白則為未分類" autocomplete="off" />
      <p class="text-xs text-slate-500 mb-2 leading-relaxed">儲存時，描述會經伺服器與入庫相同規則處理：簡轉繁、移除文案中獨立的 p400、P411 等批發價標記。</p>
      <textarea id="descEditTa" class="w-full min-h-[220px] bg-slate-800 border border-slate-600 rounded p-2 text-slate-200 text-sm" autocomplete="off"></textarea>
      <div class="flex gap-2 mt-3 justify-end flex-shrink-0">
        <button type="button" id="descEditCancel" class="px-3 py-1.5 rounded bg-slate-700 text-slate-200 text-sm">&#21462;&#28040;</button>
        <button type="button" id="descEditSave" class="px-3 py-1.5 rounded bg-blue-600 text-white text-sm">&#20786;&#23384;</button>
      </div>
    </div>
  </div>
  <script>
    const grid = document.getElementById("grid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxDesc = document.getElementById("lightboxDesc");
    const lightboxPrev = document.getElementById("lightboxPrev");
    const lightboxNext = document.getElementById("lightboxNext");
    const lightboxNav = document.getElementById("lightboxNav");
    let items = [];
    let lightboxImgs = [];
    let lightboxIdx = 0;
    let lightboxBaseDesc = "";
    let descEditId = null;
    const preloadCache = new Map();
    function esc(s) { return (s || "").replace(/</g, "&lt;").replace(/"/g, "&quot;"); }
    function trunc(s, n) { s = s || ""; return s.length <= n ? s : s.slice(0, n) + "..."; }
    function preloadImage(url) {
      if (!url || preloadCache.has(url)) return;
      const img = new Image();
      img.decoding = "async";
      img.src = url;
      preloadCache.set(url, img);
    }
    function prefetchNeighbors(idx) {
      if (!lightboxImgs.length) return;
      const n = lightboxImgs.length;
      const next = toFullUrl(lightboxImgs[(idx + 1) % n]);
      const prev = toFullUrl(lightboxImgs[(idx - 1 + n) % n]);
      preloadImage(next);
      preloadImage(prev);
    }
    function openLightbox(it) {
      const paths = it.image_paths || it.imagePaths;
      lightboxImgs = (Array.isArray(paths) && paths.length) ? paths : (it.image_path ? [it.image_path] : []);
      lightboxIdx = 0;
      lightboxBaseDesc = it.description || "";
      const firstUrl = lightboxImgs.length ? toFullUrl(lightboxImgs[0]) : "";
      lightboxImg.src = firstUrl;
      preloadImage(firstUrl);
      lightboxDesc.textContent = (lightboxImgs.length > 1 ? "(" + (lightboxIdx + 1) + "/" + lightboxImgs.length + ") " : "") + lightboxBaseDesc;
      lightboxPrev.style.display = lightboxImgs.length > 1 ? "block" : "none";
      lightboxNext.style.display = lightboxImgs.length > 1 ? "block" : "none";
      lightboxNav.innerHTML = "";
      for (let i = 0; i < lightboxImgs.length; i++) {
        const dot = document.createElement("div");
        dot.className = "nav-dot" + (i === 0 ? " active" : "");
        dot.onclick = () => lightboxShow(i);
        lightboxNav.appendChild(dot);
      }
      prefetchNeighbors(0);
      lightbox.classList.add("show");
    }
    function lightboxShow(i) {
      if (i < 0 || i >= lightboxImgs.length) return;
      lightboxIdx = i;
      const curUrl = toFullUrl(lightboxImgs[i]);
      lightboxImg.src = curUrl;
      preloadImage(curUrl);
      lightboxNav.querySelectorAll(".nav-dot").forEach((d,j) => d.classList.toggle("active", j===i));
      lightboxDesc.textContent = (lightboxImgs.length > 1 ? "(" + (lightboxIdx + 1) + "/" + lightboxImgs.length + ") " : "") + lightboxBaseDesc;
      prefetchNeighbors(i);
    }
    function toFullUrl(path) { if (!path) return ""; if (path.startsWith("http")) return path; return getApiBase() + (path.startsWith("/") ? path : "/" + path); }
    function getApiBase() { return window.location.origin; }
    function debugLog(msg) {
      const d = document.getElementById("debugOut");
      if (d) d.textContent = (d.textContent || "") + msg + "\n";
    }
    async function refreshCategoryOptions() {
      try {
        const r = await fetch("/api/categories?_=" + Date.now(), { cache: "no-store" });
        const j = await r.json();
        const sel = document.getElementById("catFilter");
        if (!sel || !j.categories) return;
        const cur = sel.value;
        while (sel.options.length > 2) sel.remove(2);
        for (const c of j.categories) {
          const o = document.createElement("option");
          o.value = c;
          o.textContent = c;
          sel.appendChild(o);
        }
        sel.value = [...sel.options].some((o) => o.value === cur) ? cur : "";
      } catch (_) {}
    }
    async function load() {
      const d = document.getElementById("debugOut");
      if (d) d.textContent = "";
      await refreshCategoryOptions();
      const q = document.getElementById("q").value.trim();
      const cat = document.getElementById("catFilter").value;
      const url = "/api/items?q=" + encodeURIComponent(q) + "&category=" + encodeURIComponent(cat) + "&_=" + Date.now();
      debugLog("fetch: " + url);
      const fetchOpts = { cache: "no-store" };
      try {
        let r = await fetch(url, fetchOpts);
        debugLog("status: " + r.status);
        let j = await r.json();
        items = j.items || [];
        const debugEl = document.getElementById("debugOut");
        if (debugEl) debugEl.textContent = "url: " + url + "\nstatus: " + r.status + "\nitems: " + (j.items ? j.items.length : "?") + "\nok: " + !!j.ok;
        if (!r.ok) {
          grid.innerHTML = '<p class="col-span-full text-red-400">API 錯誤 ' + r.status + ': ' + (j.error || r.statusText) + '</p>';
          document.getElementById("countBadge").textContent = "";
          return;
        }
        if (items.length === 0 && (location.search.includes("?t=") || location.search.includes("?fresh="))) {
          await new Promise((x) => setTimeout(x, 400));
          r = await fetch(url, fetchOpts);
          j = await r.json();
          items = j.items || [];
        }
      } catch (e) {
        debugLog("ERROR: " + e.message);
        grid.innerHTML = '<p class="col-span-full text-amber-400">無法載入: ' + esc(String(e.message)) + ' 請檢查網路或稍後再試</p>';
        document.getElementById("countBadge").textContent = "";
        return;
      }
      grid.innerHTML = "";
      document.getElementById("btnCopyShare").classList.add("hidden");
      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "col-span-full text-center py-12 text-slate-400";
        empty.innerHTML = '目前無庫存。前往<a href="/" class="text-amber-400 hover:text-amber-300 underline">抓取入庫</a>新增物品，或按 F5 重新整理。<br>若剛完成抓取，請稍候或按 F5 重新載入。';
        grid.appendChild(empty);
      }
      document.getElementById("countBadge").textContent = items.length > 0 ? "（" + items.length + " 項）" : "";
      items.forEach(it => {
        const card = document.createElement("div");
        card.className = "bg-slate-900 border border-slate-800 rounded-lg overflow-hidden";
        const shortDesc = trunc(it.description, 80);
        const imgs = (it.image_paths && it.image_paths.length) ? it.image_paths.length : 1;
        const badge = imgs > 1 ? '<span class="absolute bottom-1 right-1 text-xs bg-black/60 px-1 rounded">' + imgs + '\u5f35</span>' : "";
        const rawPath = it.image_path || (it.image_paths && it.image_paths[0]) || "";
        const imgSrc = rawPath.startsWith("http") ? rawPath : (getApiBase() + (rawPath.startsWith("/") ? rawPath : "/" + rawPath));
        const catStr = (it.category && String(it.category).trim()) ? String(it.category).trim() : "未分類";
        const catBadge = '<span class="absolute top-1 left-1 text-[10px] px-1.5 py-0.5 rounded bg-blue-600/90 text-white max-w-[7rem] truncate z-[1]" title="' + esc(catStr) + '">' + esc(catStr) + '</span>';
        card.innerHTML = '<div class="aspect-square bg-slate-800 cursor-pointer img-preview relative" data-id="' + it.id + '">' + catBadge + '<img class="w-full h-full object-cover" src="' + imgSrc + '" alt="" />' + badge + '</div><div class="p-2"><div class="descPreview text-xs bg-slate-800 border border-slate-700 rounded p-2 text-slate-300 min-h-[3rem] max-h-24 overflow-y-auto whitespace-pre-wrap cursor-pointer hover:border-slate-500" tabindex="0" data-id="' + it.id + '" title="&#40670;&#25802;&#20462;&#25913;"></div><div class="mt-2 flex w-full items-center justify-between"><button type="button" class="btnOpenEdit text-xs px-2 py-1 rounded bg-blue-600 text-white hover:bg-blue-500" data-id="' + it.id + '">&#20462;&#25913;</button><input type="checkbox" class="pick pickLarge ml-auto" data-id="' + it.id + '" aria-label="Select item" /></div></div>';
        grid.appendChild(card);
        const prevEl = card.querySelector(".descPreview");
        if (prevEl) prevEl.textContent = it.description || "";
      });
      grid.querySelectorAll(".pick").forEach(cb => cb.onchange = updateShareBtn);
      grid.querySelectorAll(".img-preview").forEach(el => {
        el.onclick = () => {
          const it = items.find(i => i.id === Number(el.dataset.id));
          if (it) openLightbox(it);
        };
      });
      function openDescEditModal(id) {
        descEditId = Number(id);
        const it = items.find((i) => i.id === descEditId);
        document.getElementById("descEditTa").value = it ? (it.description || "") : "";
        document.getElementById("descEditCat").value = it && it.category ? String(it.category) : "";
        document.getElementById("descEditModal").classList.add("show");
        setTimeout(() => document.getElementById("descEditTa").focus(), 50);
      }
      function closeDescEditModal() {
        descEditId = null;
        document.getElementById("descEditModal").classList.remove("show");
      }
      grid.querySelectorAll(".btnOpenEdit").forEach((btn) => {
        btn.onclick = (e) => { e.stopPropagation(); openDescEditModal(btn.dataset.id); };
      });
      grid.querySelectorAll(".descPreview").forEach((el) => {
        el.onclick = (e) => { e.stopPropagation(); openDescEditModal(el.dataset.id); };
        el.onkeydown = (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDescEditModal(el.dataset.id); }
        };
      });
      document.getElementById("descEditCancel").onclick = closeDescEditModal;
      document.getElementById("descEditBackdrop").onclick = closeDescEditModal;
      document.getElementById("descEditSave").onclick = async () => {
        if (descEditId == null) return;
        const description = document.getElementById("descEditTa").value;
        const btn = document.getElementById("descEditSave");
        btn.disabled = true;
        try {
          const r = await fetch("/api/items/" + descEditId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ description, category: document.getElementById("descEditCat").value })
          });
          const j = await r.json();
          if (!j.ok) throw new Error(j.error || "Save failed");
          const row = items.find((x) => x.id === descEditId);
          if (row && j.item) { row.description = j.item.description; row.category = j.item.category; }
          closeDescEditModal();
          load();
        } catch (e) {
          alert(e.message || "Save failed");
        } finally {
          btn.disabled = false;
        }
      };
      updateShareBtn();
    }
    function updateShareBtn() {
      const n = [...document.querySelectorAll(".pick:checked")].length;
      document.getElementById("btnShare").disabled = n === 0;
      document.getElementById("btnBatchDel").disabled = n === 0;
    }
    lightboxPrev.onclick = () => lightboxShow(lightboxIdx - 1);
    lightboxNext.onclick = () => lightboxShow(lightboxIdx + 1);
    document.addEventListener("keydown", (e) => {
      const dm = document.getElementById("descEditModal");
      if (dm && dm.classList.contains("show")) {
        if (e.key === "Escape") {
          dm.classList.remove("show");
          descEditId = null;
          e.preventDefault();
          return;
        }
      }
      if (!lightbox.classList.contains("show")) return;
      if (e.key === "ArrowLeft") { lightboxShow(lightboxIdx - 1); e.preventDefault(); }
      else if (e.key === "ArrowRight") { lightboxShow(lightboxIdx + 1); e.preventDefault(); }
      else if (e.key === "Escape") { lightbox.classList.remove("show"); e.preventDefault(); }
    });
    document.getElementById("btnSearch").onclick = load;
    document.getElementById("catFilter").onchange = load;
    document.getElementById("q").onkeydown = e => { if (e.key === "Enter") load(); };
    document.getElementById("btnShare").onclick = async () => {
      const ids = [...document.querySelectorAll(".pick:checked")].map(c => +c.dataset.id);
      const r = await fetch("/api/share", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ itemIds: ids }) });
      const j = await r.json();
      if (!j.ok) { alert(j.error); return; }
      document.getElementById("shareOut").textContent = j.url;
      document.getElementById("btnCopyShare").classList.remove("hidden");
    };
    document.getElementById("btnCopyShare").onclick = async () => {
      const url = document.getElementById("shareOut").textContent.trim();
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
        alert("\u5df2\u8907\u88fd");
      } catch (_) {
        alert("\u8907\u88fd\u5931\u6557\uff0c\u8acb\u624b\u52d5\u8907\u88fd\u7db2\u5740");
      }
    };
    document.getElementById("btnSelectAll").onclick = () => { grid.querySelectorAll(".pick").forEach(c => c.checked = true); updateShareBtn(); };
    document.getElementById("btnSelectNone").onclick = () => { grid.querySelectorAll(".pick").forEach(c => c.checked = false); updateShareBtn(); };
    document.getElementById("btnBatchDel").onclick = async () => {
      const ids = [...document.querySelectorAll(".pick:checked")].map(c => +c.dataset.id);
      if (!ids.length) return;
      if (!confirm("確定要刪除 " + ids.length + " 項？")) return;
      for (const id of ids) { await fetch("/api/items/" + id, { method: "DELETE" }); }
      alert("\u5df2\u522a\u9664");
      load();
    };
    document.getElementById("lightboxCloseTop").onclick = () => lightbox.classList.remove("show");
    lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove("show"); };
    load();
  </script>
</body>
</html>
