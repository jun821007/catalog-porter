<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZJ&#31934;&#21697;&#21253;&#21253;&#34915;&#26381;&#33109;&#37686;</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    #lightbox { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.88); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.5rem; align-items: flex-start; justify-content: center; }
    #lightbox.show { display: flex; }
    .lightbox-inner { position: relative; width: 100%; max-width: min(100vw - 1rem, 26rem); margin: 0 auto; min-height: min-content; display: flex; flex-direction: column; align-items: stretch; padding: 2.5rem 0.25rem 1rem; }
    #lightboxCloseTop { position: absolute; top: 0.2rem; right: 0.2rem; z-index: 30; width: 2.2rem; height: 2.2rem; border: 0; border-radius: 9999px; background: rgba(15, 23, 42, 0.72); color: #fff; font-size: 1.5rem; line-height: 1; cursor: pointer; }
    .lightbox-img-wrap { flex: 0 0 auto; display: flex; justify-content: center; align-items: center; max-height: min(48vh, 380px); }
    #lightbox img { max-width: 100%; max-height: min(48vh, 380px); width: auto; height: auto; object-fit: contain; }
    #lightbox .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 0.5rem 1rem; background: rgba(255,255,255,.2); border-radius: 8px; cursor: pointer; color: #fff; user-select: none; z-index: 10; border: 0; }
    #lightbox .nav-btn:hover { background: rgba(255,255,255,.35); }
    .lightbox-inner .nav-prev { left: 0.25rem; }
    .lightbox-inner .nav-next { right: 0.25rem; }
    #lightbox .nav-dots { display: none !important; }
    #lightbox .desc { flex: 0 1 auto; min-height: 0; max-height: min(42vh, 300px); overflow-y: auto; -webkit-overflow-scrolling: touch; width: 100%; margin-top: 0.5rem; padding: 0.35rem 0.25rem; box-sizing: border-box; text-align: left; font-size: 0.95rem; color: #e2e8f0; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-7xl mx-auto p-4">
    <p id="loading" class="text-slate-400">&#36617;&#20837;&#20013;...</p>
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 hidden"></div>
    <p id="empty" class="text-slate-500 hidden">&#27794;&#26377;&#21487;&#39023;&#31034;&#30340;&#21830;&#21697;</p>
  </main>

  <div id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-inner" id="lightboxInner">
      <button type="button" class="nav-btn nav-prev" id="lightboxPrev" style="display:none">‹ 上一張</button>
      <button type="button" class="nav-btn nav-next" id="lightboxNext" style="display:none">下一張 ›</button>
      <button type="button" id="lightboxCloseTop" aria-label="關閉">&times;</button>
      <div class="lightbox-img-wrap">
        <img id="lightboxImg" alt="預覽" />
      </div>
      <div id="lightboxNav" class="nav-dots"></div>
      <div id="lightboxDesc" class="desc"></div>
    </div>
  </div>

  <script>
    const id = location.pathname.split('/').pop();
    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxDesc = document.getElementById('lightboxDesc');
    const lightboxPrev = document.getElementById('lightboxPrev');
    const lightboxNext = document.getElementById('lightboxNext');
    const lightboxNav = document.getElementById('lightboxNav');
    let lightboxImgs = [];
    let lightboxIdx = 0;
    let lightboxBaseDesc = '';
    const preloadCache = new Map();

    function toFullUrl(path) {
      if (!path) return '';
      if (path.startsWith('http')) return path;
      return window.location.origin + (path.startsWith('/') ? path : '/' + path);
    }
    function preloadImage(url) {
      if (!url || preloadCache.has(url)) return;
      const img = new Image();
      img.decoding = 'async';
      img.src = url;
      preloadCache.set(url, img);
    }
    function prefetchNeighbors(idx) {
      if (!lightboxImgs.length) return;
      const n = lightboxImgs.length;
      preloadImage(toFullUrl(lightboxImgs[(idx + 1) % n]));
      preloadImage(toFullUrl(lightboxImgs[(idx - 1 + n) % n]));
    }
    function lightboxShow(i) {
      if (!lightboxImgs.length) return;
      const n = lightboxImgs.length;
      i = ((i % n) + n) % n;
      lightboxIdx = i;
      const url = toFullUrl(lightboxImgs[i]);
      lightboxImg.src = url;
      preloadImage(url);
      lightboxDesc.textContent = lightboxBaseDesc;
      prefetchNeighbors(i);
    }
    function openLightbox(it) {
      const paths = it.image_paths || it.imagePaths;
      lightboxImgs = (Array.isArray(paths) && paths.length) ? paths : (it.image_path ? [it.image_path] : []);
      lightboxBaseDesc = it.description || '';
      lightboxNav.innerHTML = '';
      lightboxPrev.style.display = lightboxImgs.length > 1 ? 'block' : 'none';
      lightboxNext.style.display = lightboxImgs.length > 1 ? 'block' : 'none';
      lightboxShow(0);
      lightbox.classList.add('show');
    }

    (async () => {
      const r = await fetch('/api/share/' + encodeURIComponent(id));
      const j = await r.json();
      document.getElementById('loading').classList.add('hidden');
      if (!j.ok || !j.items || !j.items.length) {
        document.getElementById('empty').classList.remove('hidden');
        return;
      }
      grid.classList.remove('hidden');
      j.items.forEach(it => {
        const d = document.createElement('div');
        d.className = 'bg-slate-900 border border-slate-800 rounded-lg overflow-hidden';
        const paths = (Array.isArray(it.image_paths) && it.image_paths.length) ? it.image_paths : (it.image_path ? [it.image_path] : []);
        const first = paths.length ? toFullUrl(paths[0]) : '';
        d.innerHTML = '<div class="aspect-square bg-slate-800 relative cursor-pointer share-preview"><img class="w-full h-full object-cover" src="' + first + '" /></div><div class="p-2 text-xs text-slate-300">' + (it.description || '').replace(/</g,'&lt;') + '</div>';
        d.querySelector('.share-preview').onclick = () => openLightbox(it);
        grid.appendChild(d);
      });
    })();

    lightboxPrev.onclick = () => lightboxShow(lightboxIdx - 1);
    lightboxNext.onclick = () => lightboxShow(lightboxIdx + 1);
    document.getElementById('lightboxCloseTop').onclick = () => lightbox.classList.remove('show');
    const lightboxInner = document.getElementById('lightboxInner');
    if (lightboxInner) lightboxInner.addEventListener('click', (e) => e.stopPropagation());
    lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.classList.remove('show'); };
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('show')) return;
      if (e.key === 'ArrowLeft') lightboxShow(lightboxIdx - 1);
      else if (e.key === 'ArrowRight') lightboxShow(lightboxIdx + 1);
      else if (e.key === 'Escape') lightbox.classList.remove('show');
    });
  </script>
</body>
</html>
